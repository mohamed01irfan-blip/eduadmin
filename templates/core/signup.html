{% extends 'base.html' %}
{% load static %}
{% block title %}Sign Up — EduAdmin{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <div class="auth-bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>EduAdmin</h1>
      <p>Create your account</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}">
          <i class="fa-solid {% if msg.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" class="form-control" name="first_name"
                 placeholder="John" value="{{ request.POST.first_name|default:'' }}"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" class="form-control" name="last_name"
                 placeholder="Doe" value="{{ request.POST.last_name|default:'' }}"/>
        </div>
      </div>

      <div class="form-group">
        <label>Username <span style="color:var(--danger)">*</span></label>
        <div class="input-icon-wrap">
          <span class="icon"><i class="fa-solid fa-user"></i></span>
          <input type="text" class="form-control" name="username" required
                 placeholder="Choose a username" value="{{ request.POST.username|default:'' }}"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email <span style="color:var(--danger)">*</span></label>
        <div class="input-icon-wrap">
          <span class="icon"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" class="form-control" name="email" required
                 placeholder="you@example.com" value="{{ request.POST.email|default:'' }}"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password <span style="color:var(--danger)">*</span></label>
          <input type="password" class="form-control" name="password1"
                 placeholder="Min 8 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password <span style="color:var(--danger)">*</span></label>
          <input type="password" class="form-control" name="password2"
                 placeholder="Repeat password" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>

    <hr class="divider"/>
    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
